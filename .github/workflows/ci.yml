# Runs unit tests on every push / PR to main (native GitHub CI).
# Requires Swift 6.3+ and macOS 26 SDK — see Package.swift.
# macos-latest (macOS 15 / Swift 6.1) is too old; use macos-26.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Build & Test
    runs-on: macos-26
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Cache SwiftPM build
        uses: actions/cache@v4
        with:
          path: .build
          key: spm-${{ runner.os }}-${{ hashFiles('Package.swift', 'Package.resolved') }}
          restore-keys: |
            spm-${{ runner.os }}-

      - name: Toolchain
        run: |
          xcodebuild -version
          swift --version
          swift --version | grep -qE 'Swift version 6\.(3|[4-9]|[1-9][0-9])' || {
            echo "::error::Swift 6.3+ required (Package.swift swift-tools-version: 6.3)"
            exit 1
          }

      - name: Select iOS Simulator
        id: simulator
        run: |
          DEVICE_ID=$(xcrun simctl list devices available -j \
            | python3 -c "
          import json, sys
          devices = json.load(sys.stdin)['devices']
          for runtime in sorted(devices.keys(), reverse=True):
              if 'iOS' not in runtime:
                  continue
              for device in devices[runtime]:
                  if device.get('isAvailable') and 'iPhone' in device['name']:
                      print(device['udid'])
                      raise SystemExit(0)
          raise SystemExit('No available iPhone simulator found')
          ")
          echo "device_id=$DEVICE_ID" >> "$GITHUB_OUTPUT"
          echo "Selected simulator UDID: $DEVICE_ID"

      - name: UI Tests
        run: |
          xcodebuild test \
            -project Demo/Demo.xcodeproj \
            -scheme DemoUITests \
            -destination "platform=iOS Simulator,id=${{ steps.simulator.outputs.device_id }}" \
            -only-testing:DemoUITests \
            -enableCodeCoverage YES
